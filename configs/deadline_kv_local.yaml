model_id: "meta-llama/Llama-2-7b-hf"
tokenizer_id: "meta-llama/Llama-2-7b-hf"
kv_layout_version: "v1-block-first"
block_size: 16
cache_dtype: "float16"
num_layers: 32
ttft_slo_ms: 500
tp_size: 4
enable_tier1_host_cache: true
enable_refinement: true
critical_codec: "int8_symm"
refinement_codec: "fp16_raw"

manifest:
  host: "127.0.0.1"
  port: 8081
  url: "http://127.0.0.1:8081"

data:
  host: "127.0.0.1"
  port: 9001

storage:
  root_dir: "/tmp/dakv_store"
  max_objects: 1000
  ttl_seconds: 3600

network:
  timeout_ms: 1000
  refine_timeout_ms: 150
  enable_simulation: false

host_cache:
  max_bytes: 4294967296
  eviction_policy: "lru"

planner:
  policy: "rule_based"
  alpha: 0.8
  min_prefix_tokens: 128

metrics:
  enable_prometheus: true
  prometheus_port: 9090
  log_level: "INFO"
